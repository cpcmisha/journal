name: Test Journal

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

env:
  APP_NAME: journalnotes
  NEXTCLOUD_VERSION: stable34

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  php:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, curl, zip, gd, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Audit Composer dependencies
        run: composer audit --locked

      - name: Validate PHP syntax
        run: |
          find appinfo lib templates tests \
            -type f \
            -name '*.php' \
            -print0 \
            | xargs -0 -n1 php -l

  nextcloud:
    name: Nextcloud 34 integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip, gd, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Set up Nextcloud
        uses: SMillerDev/nextcloud-actions/setup-nextcloud@main
        with:
          cron: false
          version: ${{ env.NEXTCLOUD_VERSION }}
          database-type: sqlite

      - name: Configure Nextcloud with Journal
        uses: SMillerDev/nextcloud-actions/setup-nextcloud-app@main
        with:
          app: ${{ env.APP_NAME }}
          check-code: false

      - name: Install app test dependencies
        run: |
          cd ../server/apps/${APP_NAME}
          composer install --no-interaction --prefer-dist

      - name: Run unit tests
        env:
          NEXTCLOUD_SERVER_ROOT: ${{ github.workspace }}/../server
        run: |
          cd ../server/apps/${APP_NAME}
          vendor/bin/phpunit --testsuite unit

      - name: Run integration tests
        env:
          NEXTCLOUD_SERVER_ROOT: ${{ github.workspace }}/../server
        run: |
          cd ../server/apps/${APP_NAME}
          vendor/bin/phpunit --testsuite integration
